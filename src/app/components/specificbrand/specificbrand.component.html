<section class="py-5">
  <h2 class="mb-5 text-capitalize text-center fw-bold popular mx-auto">
    Specific Brand Prouducts
  </h2>
  <div class="row g-4 justify-content-center">
    <div
      class="col-md-4"
      *ngFor="let item of specificProducts | searchbrand : brandId"
    >
      <div class="product coursor-pointer p-3">
        <div class="mb-3" [routerLink]="['/details', item._id]">
          <img [src]="item.imageCover" class="w-100 mb-3" [alt]="item.title" />
          <div class="">
            <h3 class="h6 text-main">
              {{ item.category.name }}
            </h3>
            <h4 class="">{{ item.title | textSlice : 0 : 2 }}</h4>
          </div>
          <div class="d-flex justify-content-between align-items-center">
            <span class="fw-bold">{{ item.price | currency : " EGP " }} </span>
            <div class="">
              <i class="fas fa-star me-1 text-warning"></i>
              <span class="text-muted">{{ item.ratingsAverage }}</span>
            </div>
          </div>
        </div>
        <button (click)="addToCart(item._id)" class="btn-main w-100">
          Add Prouduct
        </button>
      </div>
    </div>
  </div>
</section>
