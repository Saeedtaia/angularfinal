<section class="bg-main-light rounded-3 w-75 mx-auto p-3 my-3">
  <h1 class="popular mx-auto mb-3">Login</h1>
  <form [formGroup]="loginForm" (ngSubmit)="submitForm()">
    <div class="mb-2">
      <label for="email">Email :</label>
      <input
        id="email"
        formControlName="email"
        type="email"
        class="form-control mb-1"
        #emailInput
      />

      <div
        class="alert alert-danger"
        *ngIf="
          loginForm.get('email')?.errors &&
          (loginForm.get('email')?.touched || emailInput.value.length > 0)
        "
      >
        <p
          class="text-capitalize"
          *ngIf="loginForm.get('email')?.getError('required')"
        >
          Email is reqired
        </p>
        <p
          class="text-capitalize"
          *ngIf="loginForm.get('email')?.getError('email')"
        >
          email is not valid
        </p>
      </div>
    </div>
    <div class="mb-3 position-relative">
      <label for="password">password :</label
      ><input
        id="password"
        formControlName="password"
        [type]="passwordType"
        class="form-control mb-1"
        #passwordInput
      />
      <div class="position-absolute top-50 end-0 me-3">
        <i
          (click)="changeEye($event)"
          class="fa-solid fa-eye-slash coursor-pointer"
        ></i>
      </div>
    </div>
    <div
      class="alert alert-danger"
      *ngIf="
        loginForm.get('password')?.errors &&
        (loginForm.get('password')?.touched || passwordInput.value.length > 0)
      "
    >
      <p
        class="text-capitalize"
        *ngIf="loginForm.get('password')?.getError('required')"
      >
        password is reqired
      </p>
      <p
        class="text-capitalize"
        *ngIf="loginForm.get('password')?.getError('pattern')"
      >
        password is not valid
      </p>
    </div>
    <div class="d-flex justify-content-between w-100 align-items-center">
      <button [disabled]="loginForm.invalid" class="btn-main me-auto d-block">
        <i *ngIf="spinner" class="fas fa-spinner fa-spin"></i>
        Submit
      </button>
      <a
        routerLink="/ForgetPassword"
        class="text-decoration-underline text-primary"
        >Forget Password</a
      >
    </div>
  </form>
</section>
