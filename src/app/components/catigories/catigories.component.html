<section class="py-5">
  <h2 class="mb-5 text-capitalize text-center fw-bold popular mx-auto">
    All categories
  </h2>
  <input
    type="search"
    class="form-control w-50 mx-auto my-5"
    placeholder="Search..."
    [(ngModel)]="searchterm"
  />
  <div class="row g-4 justify-content-center">
    <div
      [routerLink]="['/specificcategory', item._id]"
      class="col-md-3"
      *ngFor="let item of categories | brandsearch : searchterm"
    >
      <div class="product coursor-pointer p-3">
        <div class="mb-3">
          <img
            [src]="item.image"
            class="w-100 mb-3"
            style="height: 270px"
            [alt]="item.name"
          />
          <div class="">
            <h3 class="text-main">
              {{ item.name }}
            </h3>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
