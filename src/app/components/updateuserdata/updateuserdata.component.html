<section class="p-3 mb-2 bg-main-light rounded-3 w-50 mx-auto">
  <h1 class="text-center fw-bold mb-3">Update Password</h1>
  <form [formGroup]="updateUserData" (ngSubmit)="handleform()">
    <!-- <p>{{ updateUserData.get("name")?.getError("minlenth") | json }}</p> -->
    <div class="mb-2">
      <label for="name"> name: </label>
      <input
        formControlName="name"
        type="text"
        id="name"
        class="form-control"
        #name
      />
      <div
        *ngIf="
          updateUserData.get('name')?.errors &&
          (updateUserData.get('name')?.touched || name.value.length > 0)
        "
        class="alert alert-danger mt-1"
      >
        <p
          class="text-capitalize"
          *ngIf="updateUserData.get('name')?.getError('required')"
        >
          name is required
        </p>
        <p
          class="text-capitalize"
          *ngIf="updateUserData.get('name')?.getError('minLength')"
        >
          min lenth 3
        </p>
        <p
          class="text-capitalize"
          *ngIf="updateUserData.get('name')?.getError('maxLength')"
        >
          max lenth 20
        </p>
      </div>
    </div>
    <div class="mb-2">
      <label for="email"> email: </label>
      <input
        formControlName="email"
        type="email"
        id="email"
        class="form-control"
        #email
      />
      <div
        *ngIf="
          updateUserData.get('email')?.errors &&
          (updateUserData.get('email')?.touched || email.value.length > 0)
        "
        class="alert alert-danger mt-1"
      >
        <p
          class="text-capitalize"
          *ngIf="updateUserData.get('email')?.getError('required')"
        >
          email is required
        </p>
        <p
          class="text-capitalize"
          *ngIf="updateUserData.get('email')?.getError('email')"
        >
          email is not valid
        </p>
      </div>
    </div>
    <div class="mb-2">
      <label for="phone"> phone: </label>
      <input
        formControlName="phone"
        type="tel"
        id="name"
        class="form-control"
        #phone
      />
      <div
        *ngIf="
          updateUserData.get('phone')?.errors &&
          (updateUserData.get('phone')?.touched || phone.value.length > 0)
        "
        class="alert alert-danger mt-1"
      >
        <p
          class="text-capitalize"
          *ngIf="updateUserData.get('phone')?.getError('required')"
        >
          phone is required
        </p>
        <p
          class="text-capitalize"
          *ngIf="updateUserData.get('phone')?.getError('pattern')"
        >
          phone is not valid
        </p>
      </div>
    </div>
    <button
      [disabled]="updateUserData.invalid"
      class="btn-main ms-auto d-block"
    >
      <i *ngIf="spinnerLoading" class="fas fa-spinner fa-spin"></i>
      Submit
    </button>
    <div *ngIf="messageError" class="mt-2 alert alert-danger">
      <p>{{ messageError }}</p>
    </div>
  </form>
</section>
