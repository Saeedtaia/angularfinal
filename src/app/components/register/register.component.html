<section class="bg-body-secondary p-4 rounded my-3 w-75 mx-auto">
  <h1>Register Now</h1>
  <form [formGroup]="registerForm" (ngSubmit)="handleform()">
    <!-- <p>{{ registerForm.get("name")?.getError("minlenth") | json }}</p> -->
    <div class="mb-2">
      <label for="name"> name: </label>
      <input
        formControlName="name"
        type="text"
        id="name"
        class="form-control"
        #name
      />
      <div
        *ngIf="
          registerForm.get('name')?.errors &&
          (registerForm.get('name')?.touched || name.value.length > 0)
        "
        class="alert alert-danger mt-1"
      >
        <p
          class="text-capitalize"
          *ngIf="registerForm.get('name')?.getError('required')"
        >
          name is required
        </p>
        <p
          class="text-capitalize"
          *ngIf="registerForm.get('name')?.getError('minlength')"
        >
          min lenth 3
        </p>
        <p
          class="text-capitalize"
          *ngIf="registerForm.get('name')?.getError('maxlength')"
        >
          max lenth 20
        </p>
      </div>
    </div>
    <div class="mb-2">
      <label for="email"> email: </label>
      <input
        formControlName="email"
        type="email"
        id="email"
        class="form-control"
        #email
      />
      <div
        *ngIf="
          registerForm.get('email')?.errors &&
          (registerForm.get('email')?.touched || email.value.length > 0)
        "
        class="alert alert-danger mt-1"
      >
        <p
          class="text-capitalize"
          *ngIf="registerForm.get('email')?.getError('required')"
        >
          email is required
        </p>
        <p
          class="text-capitalize"
          *ngIf="registerForm.get('email')?.getError('email')"
        >
          email is not valid
        </p>
      </div>
    </div>
    <div class="mb-2">
      <label for="password"> password: </label>
      <input
        formControlName="password"
        type="password"
        id="password"
        class="form-control"
        #passwordinput
      />
      <div
        *ngIf="
          registerForm.get('password')?.errors &&
          (registerForm.get('password')?.touched ||
            passwordinput.value.length > 0)
        "
        class="alert alert-danger mt-1"
      >
        <p
          class="text-capitalize"
          *ngIf="registerForm.get('password')?.getError('required')"
        >
          password is required
        </p>
        <p
          class="text-capitalize"
          *ngIf="registerForm.get('password')?.getError('pattern')"
        >
          password must start with upperCase then from 6 to 10
        </p>
      </div>
    </div>
    <div class="mb-2">
      <label for="repassword"> repassword: </label>
      <input
        formControlName="rePassword"
        type="password"
        id="reopassword"
        class="form-control"
        #rePassword
      />
      <div
        *ngIf="
          registerForm.get('rePassword')?.errors &&
          (registerForm.get('rePassword')?.touched ||
            rePassword.value.length > 0)
        "
        class="alert alert-danger mt-1"
      >
        <p
          class="text-capitalize"
          *ngIf="registerForm.get('rePassword')?.getError('required')"
        >
          rePassword is required
        </p>
        <p
          class="text-capitalize"
          *ngIf="registerForm.get('rePassword')?.getError('passwordMatch')"
        >
          Repassword not match Password
        </p>
      </div>
    </div>
    <div class="mb-2">
      <label for="phone"> phone: </label>
      <input
        formControlName="phone"
        type="tel"
        id="name"
        class="form-control"
        #phone
      />
      <div
        *ngIf="
          registerForm.get('phone')?.errors &&
          (registerForm.get('phone')?.touched || phone.value.length > 0)
        "
        class="alert alert-danger mt-1"
      >
        <p
          class="text-capitalize"
          *ngIf="registerForm.get('phone')?.getError('required')"
        >
          phone is required
        </p>
        <p
          class="text-capitalize"
          *ngIf="registerForm.get('phone')?.getError('pattern')"
        >
          phone is not valid
        </p>
      </div>
    </div>
    <button [disabled]="registerForm.invalid" class="btn-main ms-auto d-block">
      <i *ngIf="spinnerLoading" class="fas fa-spinner fa-spin"></i>
      Register
    </button>
    <div *ngIf="messageError" class="mt-2 alert alert-danger">
      <p>{{ messageError }}</p>
    </div>
  </form>
</section>
