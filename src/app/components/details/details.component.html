<section class="p-5">
  <div class="row align-items-center">
    <div class="col-md-3">
      <div class="">
        <owl-carousel-o [options]="detailsOptions">
          <ng-container *ngFor="let src of images">
            <ng-template carouselSlide>
              <img [src]="src" class="w-100" />
            </ng-template>
          </ng-container>
        </owl-carousel-o>
      </div>
    </div>
    <div class="offset-md-1 col-md-8 my-auto">
      <div class="">
        <h3>{{ detailsData.title }}</h3>
        <p class="text-muted">{{ detailsData.description }}</p>
        <div
          class="d-flex w-100 justify-content-between align-items-center py-3"
        >
          <span class="fw-bold">{{ detailsData.price }} EGP</span>
          <i
            (click)="addToWishlist()"
            class="fas fa-heart text-danger fa-2x coursor-pointer heart"
          ></i>
          <div class="d-flex flex-nowrap">
            <div class="">
              <i
                [ngClass]="{
                  'text-warning': detailsData.ratingsAverage >= 1,
                  'half-yellow-black': detailsData.ratingsAverage >= 0.5,
                  'lesshalf-yellow-black': detailsData.ratingsAverage < 0.5
                }"
                class="fas fa-star me-1"
              ></i>
              <i
                [ngClass]="{
                  'text-warning': detailsData.ratingsAverage >= 2,
                  'half-yellow-black': detailsData.ratingsAverage >= 1.5
                }"
                class="fas fa-star me-1"
              ></i>
              <i
                [ngClass]="{
                  'text-warning': detailsData.ratingsAverage >= 3,
                  'half-yellow-black': detailsData.ratingsAverage >= 2.5
                }"
                class="fas fa-star me-1"
              ></i>
              <i
                [ngClass]="{
                  'text-warning': detailsData.ratingsAverage >= 4,
                  'half-yellow-black': detailsData.ratingsAverage >= 3.5
                }"
                class="fas fa-star me-1"
              ></i>
              <i
                [ngClass]="{
                  'text-warning': detailsData.ratingsAverage == 5,
                  'half-yellow-black': detailsData.ratingsAverage >= 4.5
                }"
                class="fas fa-star me-1"
              ></i>
            </div>
            <p class="text-main">{{ detailsData.ratingsAverage }}</p>
          </div>
        </div>
        <div class="d-flex justify-content-between align-items-center">
          <button (click)="addToCart()" class="w-100 btn-main">
            <i class="fas fa-plus"></i> Add To Cart
          </button>
        </div>
      </div>
    </div>
  </div>
</section>
